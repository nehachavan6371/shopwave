services:
  # Backend API (FastAPI)
  - type: web
    name: shopwave-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: bash start.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: shopwave-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: FRONTEND_URL
        value: https://shopwave-frontend.onrender.com

  # Frontend (React)
  - type: web
    name: shopwave-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://shopwave-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: shopwave-db
    databaseName: shopwave
    user: shopwave
    plan: free
